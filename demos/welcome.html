<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎</title>
    <style> html { height: 100%; margin: 0; overflow: hidden; } body { height: 100%; margin: 0; overflow-y: auto; padding: 1.5rem 2rem; -webkit-overflow-scrolling: touch; } </style>
</head>
<body>
    <h1>欢迎使用 API 集成平台（动态版）</h1>
    <p>请从左侧菜单选择演示页面。</p>
    <p id="backend-status" style="margin-top: 1rem;">后端服务状态：检测中…</p>
    <script>
        (function () {
            var el = document.getElementById('backend-status');
            fetch('/')
                .then(function () {
                    el.textContent = '后端服务状态：在线 🟢';
                })
                .catch(function () {
                    el.textContent = '后端服务状态：离线 🔴 (请运行 python server.py)';
                });
        })();
    </script>
</body>
</html>
