<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度云手写作文识别（多模态）</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        html { height: 100%; margin: 0; overflow: hidden; }
        body { height: 100%; margin: 0; overflow-y: auto; overflow-x: hidden; padding-bottom: 2rem; -webkit-overflow-scrolling: touch; }
        .demo-page { padding: 1.5rem 2rem; max-width: 100%; min-height: 100%; box-sizing: border-box; }
        .demo-page h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a202c; }
        .demo-page .desc { color: #4a5568; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 500; color: #2d3748; }
        .form-group input[type="file"],
        .form-group input[type="text"],
        .form-group select { margin-right: 0.5rem; }
        .form-group input[type="text"] { width: 100%; max-width: 400px; padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 6px; }
        .form-group select { padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 6px; min-width: 120px; }
        .form-group .hint { font-size: 0.8rem; color: #718096; margin-top: 0.25rem; }
        .btn { padding: 0.5rem 1rem; background: #3182ce; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        .btn:hover { background: #2c5282; }
        .btn:disabled { background: #a0aec0; cursor: not-allowed; }
        #result { margin-top: 1.5rem; }
        .result-layout { display: flex; gap: 1rem; flex-wrap: wrap; align-items: stretch; }
        .result-json { flex: 1; min-width: 280px; max-width: 50%; }
        .result-vis { flex: 1; min-width: 280px; max-width: 50%; }
        .result-panel-title { font-weight: 600; color: #2d3748; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .vis-card { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.25rem; min-height: 200px; }
        .essay-title { font-weight: 600; font-size: 1.1rem; color: #2b6cb0; margin-bottom: 0.75rem; }
        .essay-content { white-space: pre-wrap; line-height: 1.7; color: #2d3748; font-size: 0.95rem; }
        .vis-original-wrap { position: relative; display: inline-block; max-width: 100%; margin-bottom: 1rem; overflow: visible; }
        .vis-original-wrap .img-original { display: block; max-width: 100%; height: auto; vertical-align: top; }
        .vis-original-wrap .overlay-boxes { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 1; }
        .vis-original-wrap .overlay-frames { position: absolute; left: 0; top: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
        /* 红字单独一层，盖在绿框上，不受字框尺寸裁切 */
        .vis-original-wrap .overlay-labels { position: absolute; left: 0; top: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 2; }
        /* 作文识别可视化：仅绿框 */
        .vis-original-wrap .overlay-box {
            position: absolute;
            box-sizing: border-box;
            border: 3px solid #2a9d4f;
            background: transparent;
            overflow: visible;
        }
        /* 原图红字：全页统一字号（与脚本 CHAR_LABEL_FONT_CSS_PX 一致）；定位由 JS 写在字框中心 */
        .vis-original-wrap .overlay-labels .char-label {
            position: absolute;
            margin: 0;
            padding: 0;
            line-height: 1;
            color: #ff0000;
            font-size: 16px;
            transform: translate(-50%, -50%);
            /* 接近参考图的黑体加粗效果 */
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SimHei", "Heiti SC", "Noto Sans SC", sans-serif;
            font-weight: 900;
            font-synthesis: weight;
            letter-spacing: -0.02em;
            background: transparent;
            white-space: nowrap;
            max-width: none;
            overflow: visible;
            text-align: center;
            -webkit-text-stroke: 0.45px #ff0000;
        }
        /* 无坐标时的结构化正文（段落/句子） */
        .essay-structured { margin-top: 1rem; }
        .essay-structured .result-panel-title { margin-bottom: 0.5rem; }
        .essay-paragraphs { max-height: 360px; overflow-y: auto; padding-right: 0.25rem; }
        .essay-paragraph { margin-bottom: 1rem; padding: 0.5rem 0.75rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; }
        .essay-paragraph .p-id { font-size: 0.75rem; color: #64748b; margin-bottom: 0.35rem; }
        .essay-sentence { margin-bottom: 0.35rem; padding-left: 0.5rem; border-left: 3px solid #e2e8f0; font-size: 0.9rem; line-height: 1.6; color: #334155; }
        .essay-sentence .s-id { font-size: 0.7rem; color: #94a3b8; margin-right: 0.35rem; }
        /* JSON 树形 */
        .json-tree-wrap { background: #2d3748; color: #e2e8f0; border-radius: 8px; padding: 0.75rem 1rem; font-family: monospace; font-size: 0.8rem; max-height: 520px; overflow: auto; margin: 0; white-space: pre-wrap; word-break: break-all; }
        .panel-actions { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .panel-actions .result-panel-title { margin-bottom: 0; margin-right: auto; }
        .btn-download { padding: 0.35rem 0.75rem; font-size: 0.85rem; background: #4a5568; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .btn-download:hover { background: #2d3748; }
        .status { margin-top: 0.5rem; color: #718096; }
        .error { color: #c53030; }
        .btn-top { position: fixed; right: 1.5rem; bottom: 1.5rem; width: 40px; height: 40px; border-radius: 50%; background: #3182ce; color: #fff; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: none; align-items: center; justify-content: center; font-size: 1.2rem; line-height: 1; z-index: 100; }
        .btn-top.show { display: flex; }
        .btn-top:hover { background: #2c5282; }
    </style>
</head>
<body>
    <div class="demo-page">
        <h1>百度云手写作文识别（多模态）</h1>
        <p class="desc">
            基于多模态大模型实现手写体作文内容的精准识别。支持单页、跨页、分栏作文等多种版式；能有效过滤阴影、涂抹、批注等干扰；精准识别中英文手写，输出结构化文本（含字/行/段落级坐标）。
        </p>
        <form id="form">
            <div class="form-group">
                <label for="file">上传图片或 PDF</label>
                <input type="file" id="file" name="file" accept="image/jpeg,image/jpg,image/png,image/bmp,application/pdf">
                <p class="hint">与下方 URL 二选一，上传优先。最短边≥15px，最长边≤4096px，支持 jpg/png/bmp/pdf。</p>
            </div>
            <div class="form-group">
                <label for="url">或图片 URL</label>
                <input type="text" id="url" name="url" placeholder="https://...">
                <p class="hint">请关闭 URL 防盗链。</p>
            </div>
            <div class="form-group">
                <label for="recognize_granularity">识别粒度 recognize_granularity</label>
                <select id="recognize_granularity" name="recognize_granularity">
                    <option value="">默认（不传）</option>
                    <option value="none">none - 不返回坐标</option>
                    <option value="line">line - 行级坐标</option>
                    <option value="word">word - 行级+字级坐标</option>
                </select>
                <p class="hint">须选 <strong>line</strong> 或 <strong>word</strong> 才会返回坐标并在右侧显示绿框与红字；选 <strong>word</strong> 才有字级框。</p>
            </div>
            <div class="form-group">
                <label for="pdf_file_num">pdf_file_num（可选）</label>
                <input type="text" id="pdf_file_num" name="pdf_file_num" placeholder="留空使用默认">
                <p class="hint">PDF 文件页数等参数，可选。</p>
            </div>
            <button type="submit" class="btn" id="submitBtn">提交</button>
        </form>
        <p class="status" id="status"></p>
        <div id="result"></div>
        <button type="button" class="btn-top" id="btnTop" title="回到顶部">↑</button>
    </div>
    <script>
        (function () {
            var form = document.getElementById('form');
            var submitBtn = document.getElementById('submitBtn');
            var statusEl = document.getElementById('status');
            var resultEl = document.getElementById('result');

            function setStatus(msg, isError) {
                statusEl.textContent = msg;
                statusEl.className = 'status' + (isError ? ' error' : '');
            }

            function escapeHtml(s) {
                if (s == null) return '';
                var div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            function getAllLinesFromContent(content) {
                var raw = content && content.lines ? content.lines : [];
                var flat = [];
                raw.forEach(function (item) {
                    if (Array.isArray(item)) {
                        item.forEach(function (ln) { flat.push(ln); });
                    } else if (item && typeof item === 'object') {
                        flat.push(item);
                    }
                });
                return flat;
            }

            function charBbox(c) {
                if (!c) return null;
                return c.bbox != null ? c.bbox : (c.location != null ? c.location : (c.box != null ? c.box : null));
            }

            function resolveEssayInner(data) {
                var r = data.result;
                if (!r) return {};
                if (r.result && (r.result.content != null || r.result.title != null || r.result.essayOverall != null)) return r.result;
                if (r.content != null || r.title != null || r.essayOverall != null) return r;
                return {};
            }

            function buildVisHtml(data, inputImageUrl) {
                if (data.error_code && data.error_code !== 0 && data.error_code !== '0') {
                    return '<div class="vis-card"><p class="error">' + escapeHtml(data.error_msg || data.error || '请求失败') + '</p></div>';
                }
                var inner = resolveEssayInner(data);
                var essayOverall = inner.essayOverall || {};
                var title = inner.title || {};
                var content = inner.content || {};
                var granularity = (inner.recognize_granularity || '').toLowerCase();
                var hasCoords = granularity === 'line' || granularity === 'word';
                var linesFlat = getAllLinesFromContent(content);
                var hasTitleChars = title.chars && title.chars.length;
                var hasLineChars = linesFlat.some(function (ln) { return ln.chars && ln.chars.length; });
                var hasImageOverlay = inputImageUrl && hasCoords && (
                    (content && content.lines && content.lines.length) ||
                    (title && title.bbox) ||
                    hasTitleChars ||
                    hasLineChars ||
                    (content && content.paragraphs && content.paragraphs.some(function (p) { return p.bbox && (Array.isArray(p.bbox) ? p.bbox.length : true); }))
                );

                var html = '<div class="vis-card">';
                html += '<div class="essay-title">' + escapeHtml(essayOverall.titleText || title.text || '（无标题）') + '</div>';
                html += '<div class="essay-content">' + escapeHtml(essayOverall.contentText || '') + '</div>';

                var paragraphs = content && content.paragraphs ? content.paragraphs : [];
                if (paragraphs.length) {
                    html += '<div class="essay-structured"><div class="result-panel-title">段落与句子</div><div class="essay-paragraphs">';
                    paragraphs.forEach(function (p) {
                        html += '<div class="essay-paragraph"><div class="p-id">' + escapeHtml(p.paragraphId || '') + '</div>';
                        var sentences = p.sentences || [];
                        sentences.forEach(function (s) {
                            html += '<div class="essay-sentence"><span class="s-id">' + escapeHtml(s.sentenceId || '') + '</span>' + escapeHtml(s.text || '') + '</div>';
                        });
                        if (!sentences.length && p.text) html += '<div class="essay-sentence">' + escapeHtml(p.text) + '</div>';
                        html += '</div>';
                    });
                    html += '</div></div>';
                }

                if (hasImageOverlay) {
                    html += '<div class="result-panel-title" style="margin-top:1rem">原图标注</div>';
                    html += '<div class="vis-original-wrap"><img class="img-original" src="' + escapeHtml(inputImageUrl) + '" alt="原图"><div class="overlay-boxes"><div class="overlay-frames"></div><div class="overlay-labels"></div></div></div>';
                } else if (inputImageUrl) {
                    html += '<div class="result-panel-title" style="margin-top:1rem">原图</div>';
                    html += '<div class="vis-original-wrap"><img class="img-original" src="' + escapeHtml(inputImageUrl) + '" alt="原图"></div>';
                }
                html += '</div>';
                return html;
            }

            function normalizeBboxList(bbox) {
                if (bbox == null) return [];
                var parsed = bbox;
                if (typeof bbox === 'string') {
                    try {
                        parsed = JSON.parse(bbox);
                    } catch (e) {
                        var parts = bbox.split(/[\s,]+/).map(Number);
                        if (parts.length >= 4) parsed = [parts[0], parts[1], parts[2], parts[3]];
                        else parsed = [];
                    }
                }
                var out = [];
                var arr = Array.isArray(parsed) ? parsed : [parsed];
                arr.forEach(function (b) {
                    if (b == null) return;
                    var x, y, w, h;
                    if (Array.isArray(b)) {
                        x = b[0] != null ? b[0] : 0;
                        y = b[1] != null ? b[1] : 0;
                        w = (b[2] != null ? b[2] : 0);
                        h = (b[3] != null ? b[3] : 0);
                    } else if (typeof b === 'object') {
                        /* 百度等接口常用 left/top/width/height，与 x/y/w/h 混用 */
                        x = b.x != null ? Number(b.x) : (b.left != null ? Number(b.left) : 0);
                        y = b.y != null ? Number(b.y) : (b.top != null ? Number(b.top) : 0);
                        w = b.w != null ? Number(b.w) : (b.width != null ? Number(b.width) : 0);
                        h = b.h != null ? Number(b.h) : (b.height != null ? Number(b.height) : 0);
                    } else {
                        return;
                    }
                    if (w > 0 || h > 0) out.push({ x: x, y: y, w: w, h: h });
                });
                return out;
            }

            function charTextFrom(c) {
                if (!c) return '';
                if (c.text != null && c.text !== '') return String(c.text);
                if (c.char != null && c.char !== '') return String(c.char);
                if (c.word != null && c.word !== '') return String(c.word);
                if (c.value != null && c.value !== '') return String(c.value);
                return '';
            }

            /** 红字统一字号（CSS 像素），改此处时请同步 .char-label 的 font-size 与 downloadVis 中换算 */
            var CHAR_LABEL_FONT_CSS_PX = 16;

            function drawOverlayBoxes(imgEl, overlayEl, innerResult) {
                var nw = imgEl.naturalWidth;
                var nh = imgEl.naturalHeight;
                var dw = imgEl.offsetWidth;
                var dh = imgEl.offsetHeight;
                if (!nw || !nh) return;

                var framesEl = overlayEl.querySelector('.overlay-frames');
                var labelsEl = overlayEl.querySelector('.overlay-labels');
                if (!framesEl || !labelsEl) return;

                var scaleX = dw / nw;
                var scaleY = dh / nh;
                var granularity = (innerResult.recognize_granularity || '').toLowerCase();

                function addBoxes(bboxList, charText) {
                    var list = normalizeBboxList(bboxList);
                    list.forEach(function (b) {
                        var x = b.x, y = b.y, w = b.w, h = b.h;
                        if (w <= 0 && h <= 0) return;
                        var dispW = Math.max(w * scaleX, 2);
                        var dispH = Math.max(h * scaleY, 2);
                        var div = document.createElement('div');
                        div.className = 'overlay-box';
                        div.style.left = (x * scaleX) + 'px';
                        div.style.top = (y * scaleY) + 'px';
                        div.style.width = dispW + 'px';
                        div.style.height = dispH + 'px';
                        framesEl.appendChild(div);
                        if (charText != null && charText !== '') {
                            var label = document.createElement('span');
                            label.className = 'char-label';
                            label.textContent = charText;
                            var cx = (x + w / 2) * scaleX;
                            var cy = (y + h / 2) * scaleY;
                            label.style.left = cx + 'px';
                            label.style.top = cy + 'px';
                            labelsEl.appendChild(label);
                        }
                    });
                }

                var title = innerResult.title || {};
                var content = innerResult.content || {};
                var lines = getAllLinesFromContent(content);
                var paragraphs = (content && content.paragraphs) ? content.paragraphs : [];

                if (granularity === 'word') {
                    if (title.chars && title.chars.length) {
                        title.chars.forEach(function (c) {
                            addBoxes(charBbox(c), charTextFrom(c));
                        });
                    } else {
                        addBoxes(title.bbox, title.text || '');
                    }
                    lines.forEach(function (line) {
                        if (line.chars && line.chars.length) {
                            line.chars.forEach(function (c) {
                                addBoxes(charBbox(c), charTextFrom(c));
                            });
                        } else {
                            addBoxes(line.bbox, line.text || '');
                        }
                    });
                } else {
                    addBoxes(title.bbox, title.text || '');
                    paragraphs.forEach(function (p) {
                        addBoxes(p.bbox, (p.text || '').slice(0, 24));
                        (p.sentences || []).forEach(function (s) {
                            addBoxes(s.bbox, (s.text || '').slice(0, 24));
                        });
                    });
                    lines.forEach(function (line) {
                        addBoxes(line.bbox, line.text || '');
                    });
                }
            }

            var lastResultData = null;
            var lastInputImageUrl = null;

            function downloadJson() {
                if (!lastResultData) return;
                var blob = new Blob([JSON.stringify(lastResultData, null, 2)], { type: 'application/json' });
                var name = 'handwriting_composition_result_' + new Date().toISOString().slice(0, 19).replace(/[-:T]/g, '').replace(' ', '_') + '.json';
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = name;
                a.click();
                URL.revokeObjectURL(a.href);
            }

            function downloadVis() {
                var wrap = resultEl.querySelector('.vis-original-wrap');
                var img = wrap && wrap.querySelector('.img-original');
                if (!img || !img.complete || !img.naturalWidth) {
                    if (lastInputImageUrl) {
                        var a = document.createElement('a');
                        a.href = lastInputImageUrl;
                        a.download = 'handwriting_composition_original.png';
                        a.target = '_blank';
                        a.click();
                    }
                    return;
                }
                try {
                    var canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    var inner = resolveEssayInner(lastResultData || {});
                    var granularity = (inner.recognize_granularity || '').toLowerCase();
                    var title = inner.title || {};
                    var content = inner.content || {};
                    var lineW = Math.max(3, Math.min(5, Math.min(canvas.width, canvas.height) / 280));
                    /* 与页面统一：CSS 字号换算到原图像素（与当前 img 显示宽度比例一致） */
                    var dispW = img.offsetWidth || img.naturalWidth;
                    var fontNat = Math.round(CHAR_LABEL_FONT_CSS_PX * img.naturalWidth / Math.max(dispW, 1));
                    fontNat = Math.max(10, Math.min(96, fontNat));

                    function drawRects(bboxList, charText) {
                        var list = normalizeBboxList(bboxList);
                        list.forEach(function (b) {
                            var x = b.x, y = b.y, w = b.w, h = b.h;
                            if (w <= 0 && h <= 0) return;
                            ctx.strokeStyle = '#2a9d4f';
                            ctx.lineWidth = lineW;
                            ctx.setLineDash([]);
                            ctx.strokeRect(x, y, w, h);
                            if (charText != null && charText !== '') {
                                var fontSize = fontNat;
                                var fontStack = '"PingFang SC","Hiragino Sans GB","Microsoft YaHei",SimHei,sans-serif';
                                ctx.font = '900 ' + fontSize + 'px ' + fontStack;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillStyle = '#ff0000';
                                ctx.lineJoin = 'round';
                                ctx.miterLimit = 2;
                                ctx.strokeStyle = '#ff0000';
                                ctx.lineWidth = Math.max(1, Math.min(2.5, fontSize * 0.1));
                                var cx = x + w / 2;
                                var cy = y + h / 2;
                                ctx.strokeText(charText, cx, cy);
                                ctx.fillText(charText, cx, cy);
                            }
                        });
                    }

                    var lines = getAllLinesFromContent(content);
                    var paragraphs = (content && content.paragraphs) || [];
                    if (granularity === 'word') {
                        if (title.chars && title.chars.length) {
                            title.chars.forEach(function (c) { drawRects(charBbox(c), charTextFrom(c)); });
                        } else {
                            drawRects(title.bbox, title.text || '');
                        }
                        lines.forEach(function (line) {
                            if (line.chars && line.chars.length) {
                                line.chars.forEach(function (c) { drawRects(charBbox(c), charTextFrom(c)); });
                            } else {
                                drawRects(line.bbox, line.text || '');
                            }
                        });
                    } else {
                        drawRects(title.bbox, title.text || '');
                        paragraphs.forEach(function (p) {
                            drawRects(p.bbox, (p.text || '').slice(0, 24));
                            (p.sentences || []).forEach(function (s) { drawRects(s.bbox, (s.text || '').slice(0, 24)); });
                        });
                        lines.forEach(function (line) { drawRects(line.bbox, line.text || ''); });
                    }
                    var dataUrl = canvas.toDataURL('image/png');
                    var a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = 'handwriting_composition_annotated_' + new Date().toISOString().slice(0, 19).replace(/[-:T]/g, '').replace(' ', '_') + '.png';
                    a.click();
                } catch (e) {
                    if (lastInputImageUrl) {
                        var a = document.createElement('a');
                        a.href = lastInputImageUrl;
                        a.download = 'handwriting_composition_original.png';
                        a.target = '_blank';
                        a.click();
                    }
                }
            }

            function showResult(data, inputImageUrl) {
                lastResultData = data;
                lastInputImageUrl = inputImageUrl || null;
                var inner = resolveEssayInner(data);
                var jsonStr = JSON.stringify(data, null, 2);
                var jsonBlock = '<div class="panel-actions"><span class="result-panel-title">原始 JSON</span><button type="button" class="btn-download" id="btnCopyJson">一键复制</button><button type="button" class="btn-download" id="btnDownloadJson">一键下载</button></div><pre class="json-tree-wrap">' + escapeHtml(jsonStr) + '</pre>';
                var visHtml = buildVisHtml(data, inputImageUrl);
                resultEl.innerHTML = '<div class="result-layout">' +
                    '<div class="result-json">' + jsonBlock + '</div>' +
                    '<div class="result-vis"><div class="panel-actions"><span class="result-panel-title">识别结果</span><button type="button" class="btn-download" id="btnDownloadVis">下载标注图</button></div>' + visHtml + '</div>' +
                    '</div>';

                var btnCopy = resultEl.querySelector('#btnCopyJson');
                var btnJson = resultEl.querySelector('#btnDownloadJson');
                var btnVis = resultEl.querySelector('#btnDownloadVis');
                if (btnCopy) btnCopy.addEventListener('click', function () {
                    navigator.clipboard.writeText(JSON.stringify(lastResultData, null, 2)).then(function () {
                        btnCopy.textContent = '已复制';
                        setTimeout(function () { btnCopy.textContent = '一键复制'; }, 1500);
                    });
                });
                if (btnJson) btnJson.addEventListener('click', downloadJson);
                if (btnVis) btnVis.addEventListener('click', downloadVis);

                var gran = inner && (inner.recognize_granularity || '').toLowerCase();
                var hasCoords = gran === 'line' || gran === 'word';
                var content = inner && inner.content;
                var titleIn = inner && inner.title;
                var linesForCheck = getAllLinesFromContent(content || {});
                var hasAnyBbox = hasCoords && (
                    (content && content.lines && content.lines.length) ||
                    (titleIn && titleIn.bbox) ||
                    (titleIn && titleIn.chars && titleIn.chars.length) ||
                    linesForCheck.some(function (ln) { return ln.chars && ln.chars.length; }) ||
                    (content && content.paragraphs && content.paragraphs.some(function (p) { return p.bbox && (Array.isArray(p.bbox) ? p.bbox.length : true); }))
                );
                if (inputImageUrl && inner && hasAnyBbox) {
                    var wrap = resultEl.querySelector('.vis-original-wrap');
                    var img = wrap && wrap.querySelector('.img-original');
                    var overlay = wrap && wrap.querySelector('.overlay-boxes');
                    if (img && overlay) {
                        if (img.complete && img.naturalWidth) {
                            drawOverlayBoxes(img, overlay, inner);
                        } else {
                            img.onload = function () { drawOverlayBoxes(img, overlay, inner); };
                        }
                    }
                }
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var fileInput = document.getElementById('file');
                var urlInput = document.getElementById('url');
                if (!fileInput.files.length && !urlInput.value.trim()) {
                    setStatus('请上传图片/PDF 或填写图片 URL', true);
                    return;
                }

                var inputImageUrl = null;
                if (fileInput.files.length) {
                    var f = fileInput.files[0];
                    var fname = (f.name || '').toLowerCase();
                    if (!fname.endsWith('.pdf')) {
                        inputImageUrl = URL.createObjectURL(f);
                    }
                }

                submitBtn.disabled = true;
                setStatus('提交中…');
                resultEl.innerHTML = '';
                setStatus('手写作文识别，正在轮询结果（约 5～10 秒）…');

                var formData = new FormData();
                formData.append('recognize_granularity', document.getElementById('recognize_granularity').value);
                var pdfNum = document.getElementById('pdf_file_num').value.trim();
                if (pdfNum) formData.append('pdf_file_num', pdfNum);
                if (fileInput.files.length) formData.append('file', fileInput.files[0]);
                else formData.append('url', urlInput.value.trim());

                fetch('/api/demo/baidu_handwriting_composition', {
                    method: 'POST',
                    body: formData
                })
                    .then(function (r) {
                        return r.json().then(function (json) {
                            if (!r.ok) throw { status: r.status, body: json };
                            return json;
                        });
                    })
                    .then(function (data) {
                        setStatus('识别完成');
                        showResult(data, inputImageUrl);
                    })
                    .catch(function (err) {
                        var msg = err.body && (err.body.error_msg || err.body.error) ? (err.body.error_msg || err.body.error) : (err.message || '请求失败');
                        setStatus('错误：' + msg, true);
                        if (err.body) showResult(err.body);
                    })
                    .finally(function () {
                        submitBtn.disabled = false;
                    });
            });

            var btnTop = document.getElementById('btnTop');
            if (btnTop) {
                function onScroll() { btnTop.classList.toggle('show', window.pageYOffset > 200); }
                window.addEventListener('scroll', onScroll);
                btnTop.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
            }
        })();
    </script>
</body>
</html>
